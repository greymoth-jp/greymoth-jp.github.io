<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <pattern id="halftone" width="11" height="11" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#0b0b0b"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#f4f4f2"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.04"/>

  <!-- masthead rules -->
  <rect x="64" y="70" width="1072" height="3" fill="#0b0b0b"/>
  <text x="64" y="108" font-family="'Space Mono',monospace" font-weight="700" font-size="22" letter-spacing="6" fill="#0b0b0b">GREYMOTH</text>
  <text x="1136" y="108" text-anchor="end" font-family="'Space Mono',monospace" font-size="20" letter-spacing="5" fill="#8c8c87">PROOF, NOT PITCH · TOKYO</text>
  <rect x="64" y="124" width="1072" height="1.5" fill="#0b0b0b"/>

  <!-- hero with registration-offset ghost -->
  <text x="60" y="296" font-family="'Archivo Black','Arial Black',sans-serif" font-size="118" letter-spacing="-2" fill="#cdcdc7">I BUILD</text>
  <text x="56" y="291" font-family="'Archivo Black','Arial Black',sans-serif" font-size="118" letter-spacing="-2" fill="#0b0b0b">I BUILD</text>
  <text x="60" y="418" font-family="'Archivo Black','Arial Black',sans-serif" font-size="118" letter-spacing="-2" fill="#cdcdc7">IN THE OPEN.</text>
  <text x="56" y="413" font-family="'Archivo Black','Arial Black',sans-serif" font-size="118" letter-spacing="-2" fill="#0b0b0b">IN THE OPEN.</text>

  <!-- big proof number + halftone -->
  <rect x="64" y="470" width="1072" height="96" fill="none" stroke="#0b0b0b" stroke-width="3"/>
  <rect x="67" y="473" width="270" height="90" fill="url(#halftone)" opacity="0.10"/>
  <text x="92" y="546" font-family="'Archivo Black','Arial Black',sans-serif" font-size="74" fill="#0b0b0b">23</text>
  <text x="214" y="512" font-family="'Space Mono',monospace" font-weight="700" font-size="22" letter-spacing="2" fill="#0b0b0b">PRs MERGED INTO NAMED OSS</text>
  <text x="214" y="544" font-family="'Space Mono',monospace" font-size="18" fill="#3a3a38">vite · scrapy · postcss · raylib · nestjs · medusa · more in review</text>

  <text x="1136" y="606" text-anchor="end" font-family="'Space Mono',monospace" font-size="16" letter-spacing="2" fill="#8c8c87">greymoth-jp.github.io</text>
</svg>
