<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#f1ead8"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.05"/>
  <!-- vermillion offset frame (riso misregistration feel) -->
  <rect x="46" y="40" width="1108" height="550" fill="none" stroke="#c4341f" stroke-width="2" opacity="0.55"/>
  <rect x="40" y="46" width="1108" height="550" fill="none" stroke="#211c14" stroke-width="2.5"/>

  <text x="84" y="132" font-family="'DM Mono',monospace" font-size="22" letter-spacing="7" fill="#9c3a2c">GREYMOTH · TOKYO</text>

  <text x="80" y="270" font-family="Georgia,'Fraunces',serif" font-size="108" font-weight="600" fill="#211c14">I build in</text>
  <text x="80" y="382" font-family="Georgia,'Fraunces',serif" font-size="108" font-weight="600" fill="#211c14">the open<tspan fill="#c4341f">.</tspan></text>

  <text x="84" y="452" font-family="Georgia,'Fraunces',serif" font-style="italic" font-size="30" fill="#4a4233">19, Tokyo. Builds fast, ships into real OSS, honest about what died.</text>

  <!-- three proof chips -->
  <g font-family="'DM Mono',monospace" font-size="22" font-weight="500">
    <rect x="84" y="500" width="270" height="50" rx="3" fill="none" stroke="#9c3a2c" stroke-width="1.5"/>
    <text x="104" y="532" fill="#9c3a2c">2 merged · 16 open PRs</text>

    <rect x="372" y="500" width="232" height="50" rx="3" fill="none" stroke="#2f4a6b" stroke-width="1.5"/>
    <text x="392" y="532" fill="#2f4a6b">40 tools scored</text>

    <rect x="622" y="500" width="290" height="50" rx="3" fill="none" stroke="#2f4a6b" stroke-width="1.5"/>
    <text x="642" y="532" fill="#2f4a6b">128 built · most died</text>
  </g>

  <text x="1116" y="566" text-anchor="end" font-family="'DM Mono',monospace" font-size="16" letter-spacing="2" fill="#9a9079">greymoth-jp.github.io</text>
</svg>
