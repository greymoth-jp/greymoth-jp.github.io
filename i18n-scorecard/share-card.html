<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>i18n / cjk readiness card</title><style>
:root{
  --ink:#141414; --paper:#f7f6f2; --track:#e4e1da;
  --sans:"Helvetica Neue",Helvetica,Arial,"Segoe UI",system-ui,sans-serif;
  --mono:ui-monospace,"SFMono-Regular","Menlo","Consolas","Liberation Mono",monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{width:1200px;height:630px;background:var(--paper);color:var(--ink);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;overflow:hidden;
  background-image:radial-gradient(rgba(20,20,20,.055) .7px,transparent .7px);background-size:5px 5px}
.card{width:1200px;height:630px;padding:56px 64px;display:flex;flex-direction:column;position:relative}
.card .kicker{font-size:15px;letter-spacing:4px;text-transform:uppercase;color:#7a776f}
.card .brand{position:absolute;top:56px;right:64px;font-weight:700;letter-spacing:.5px;font-size:20px}
.card .brand small{display:block;text-align:right;font-weight:400;color:#7a776f;letter-spacing:2px;
  text-transform:uppercase;font-size:11px;margin-top:2px}
.card h1{font-size:52px;line-height:1.05;margin:10px 0 0;font-weight:700;letter-spacing:-.5px;max-width:16ch}
.card .target{font-family:var(--mono);font-size:20px;color:#4a4843;margin-top:14px}
.card .mid{display:flex;align-items:center;gap:48px;margin-top:auto}
.card .verdict b{text-transform:uppercase;letter-spacing:2.4px;font-size:22px}
.card .verdict{font-size:19px;color:#55524b;margin-top:12px}
.card .worst{margin-top:20px;display:flex;flex-direction:column;gap:12px;min-width:360px}
.card .w-row{display:flex;align-items:center;gap:14px;font-size:16px}
.card .w-row .wn{flex:1 1 auto;color:#2e2c28}
.card .w-row .ws{font-family:var(--mono);font-weight:600;width:34px;text-align:right}
.card .w-row .wbar{flex:0 0 150px;height:7px;background:var(--track);border-radius:4px;overflow:hidden}
.card .w-row .wbar i{display:block;height:100%;background:var(--ink)}
.card .foot{position:absolute;left:64px;right:64px;bottom:40px;display:flex;justify-content:space-between;
  font-size:13px;color:#8a8a8a;font-family:var(--mono)}
.chip{display:inline-block;min-width:30px;text-align:center;color:#fff;font-family:var(--mono);
  font-weight:600;font-size:26px;padding:2px 12px;border-radius:3px}
</style></head>
<body><div class="card">
  <div class="brand">greymoth<small>i18n · cjk</small></div>
  <div class="kicker">readiness scorecard</div>
  <h1>i18n / CJK readiness</h1>
  <div class="target">sample</div>
  <div class="mid">
    <div style="text-align:center">
      <svg class="ring" width="240" height="240" viewBox="0 0 240 240" role="img" aria-label="score 66">
    <circle cx="120" cy="120" r="113.5" fill="none" stroke="#e4e1da" stroke-width="13"/>
    <circle cx="120" cy="120" r="113.5" fill="none" stroke="#141414" stroke-width="13"
      stroke-linecap="butt" stroke-dasharray="713.14" stroke-dashoffset="242.47"
      transform="rotate(-90 120 120)"/>
    <text x="120" y="120" text-anchor="middle" dominant-baseline="central"
      font-family="var(--mono)" font-size="84" font-weight="600" fill="#141414">66</text>
    
  </svg>
      <div style="margin-top:14px"><span class="chip" style="background:#565656">C</span></div>
    </div>
    <div style="flex:1 1 auto">
      <div class="verdict"><b>at risk</b><div>18 hazards · 4 files scanned</div></div>
      <div class="worst">
    <div class="w-row">
      <span class="wn">Text integrity &amp; Trojan Source</span>
      <span class="wbar"><i style="width:45%"></i></span>
      <span class="ws">45</span>
    </div>
    <div class="w-row">
      <span class="wn">Grapheme &amp; length correctness</span>
      <span class="wbar"><i style="width:61%"></i></span>
      <span class="ws">61</span>
    </div>
    <div class="w-row">
      <span class="wn">Encoding &amp; mojibake</span>
      <span class="wbar"><i style="width:70%"></i></span>
      <span class="ws">70</span>
    </div></div>
    </div>
  </div>
  <div class="foot"><span>deterministic · UTS#39 · UAX#29 · CVE-2021-42574</span><span>free · no waitlist · scan your repo</span></div>
</div></body></html>
